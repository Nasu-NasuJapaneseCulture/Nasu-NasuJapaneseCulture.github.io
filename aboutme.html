<h2>About Me🍀</h2>
Hello! My name is  Nasu_Nasu🍆<br>
I create videos and flyers to share the uniqueness of Japanese culture and cuisine with people around the world. 🌏<br>
I’d like to introduce unique, healthy fermented foods—and ideally other Japanese foods or aspects of Japanese culture—through short videos and flyers.<br>
 Please feel free to incorporate them into your daily life in whatever way suits you best.👍<br>
I use images borrowed from free stock photo sites, as well as materials I’ve drawn or photographed myself, which I edit manually using a stop-motion app.🎞️<br>
I only use AI for the audio and translation.<br>
For the flyers, I also use AI only for translation🤖; I design them by hand, coming up with the concepts myself.👋🔧<br><br>
